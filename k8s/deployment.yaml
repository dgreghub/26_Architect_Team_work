apiVersion: apps/v1
kind: Deployment
metadata:
  name: architect-chatbot
  namespace: eshop
  labels:
    app: architect-chatbot
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: architect-chatbot
  template:
    metadata:
      labels:
        app: architect-chatbot
        version: v1
    spec:
      containers:
      - name: chatbot
        image: us-east1-docker.pkg.dev/architect-certification-289902/docker-repo-2601-33/orchestration-admin-console:21
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7860
          name: http
          protocol: TCP
        env:
        - name: GRADIO_HOST
          value: "0.0.0.0"
        - name: GRADIO_PORT
          value: "7860"
        - name: GRADIO_SHARE
          value: "false"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
      securityContext:
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - architect-chatbot
              topologyKey: kubernetes.io/hostname
