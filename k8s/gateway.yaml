apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: architect-chatbot-gateway
  namespace: eshop
  annotations:
    networking.gke.io/certmap: "dev-2601-33-cert-map"
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        options:
          networking.gke.io/pre-shared-certs: ""
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: architect-chatbot-route
  namespace: eshop
spec:
  parentRefs:
    - name: architect-chatbot-gateway
  hostnames:
    - "eight.arch.chatbot.a-sds.net"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: architect-chatbot
          port: 80