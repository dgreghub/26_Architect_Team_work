name: Build and Push Docker Image to GCR

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/docker-build-push.yaml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (default: git commit sha)'
        required: false
        default: ''

env:
  REGISTRY: gcr.io
  IMAGE_NAME: architect-chatbot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
        service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Configure Docker for GCR
      run: |
        gcloud auth configure-docker ${{ env.REGISTRY }}

    - name: Determine image tag
      id: image_tag
      run: |
        if [ "${{ github.event.inputs.image_tag }}" != "" ]; then
          TAG="${{ github.event.inputs.image_tag }}"
        else
          TAG="$(echo ${{ github.sha }} | cut -c1-7)"
        fi
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "Image tag: ${TAG}"

    - name: Build Docker image
      run: |
        docker build \
          -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ steps.image_tag.outputs.tag }} \
          -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest \
          -f Dockerfile .

    - name: Push to Google Container Registry
      run: |
        docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ steps.image_tag.outputs.tag }}
        docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest

    - name: Image scanning (optional)
      run: |
        gcloud container images scan ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ steps.image_tag.outputs.tag }} || true

    - name: Output image URI
      run: |
        echo "Image built and pushed: ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ steps.image_tag.outputs.tag }}"
